<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Graduation cap -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cap top (board) -->
  <path d="M16 4 L4 10 L16 16 L28 10 Z" fill="url(#grad)"/>

  <!-- Cap base -->
  <path d="M4 10 L4 14 L16 20 L28 14 L28 10 L16 16 Z" fill="#991b1b" opacity="0.8"/>

  <!-- Tassel -->
  <circle cx="16" cy="4" r="1.5" fill="#fbbf24"/>
  <line x1="16" y1="5.5" x2="16" y2="9" stroke="#fbbf24" stroke-width="0.5"/>

  <!-- Building base -->
  <rect x="8" y="20" width="16" height="8" fill="#1e293b" rx="0.5"/>

  <!-- Columns -->
  <rect x="10" y="20" width="2" height="8" fill="#475569"/>
  <rect x="15" y="20" width="2" height="8" fill="#475569"/>
  <rect x="20" y="20" width="2" height="8" fill="#475569"/>
</svg>
